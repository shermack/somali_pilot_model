<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garissa University | Somali Culture Model</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-stage" aria-hidden="true">
    <div class="bg-layer bg-layer-one active"></div>
    <div class="bg-layer bg-layer-two"></div>
    <div class="bg-overlay"></div>
  </div>

  <div class="app-shell">
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" id="newChatBtn" type="button">
          <span class="btn-icon">+</span>
          <span>New Chat</span>
        </button>

        <label class="model-selector">
          <span>Model</span>
          <select id="modelSelect" aria-label="Select model">
            <option value="Somali Model Pilot 1" selected>Somali Model Pilot 1</option>
            <option value="Pilot 2" disabled>Pilot 2 (disabled)</option>
          </select>
        </label>
      </div>

      <div class="history-wrap">
        <div class="section-label">Conversations</div>
        <div class="history-list" id="historyList" aria-live="polite"></div>
      </div>
    </aside>

    <main class="chat-layout">
      <header class="chat-header glass-panel">
        <div class="header-left">
          <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle conversation sidebar">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <img src="assets/Logo/logo.png" alt="Garissa University logo" class="brand-logo">
          <div class="brand-copy">
            <h1>Garissa University</h1>
            <p>Somali Culture Model</p>
          </div>
        </div>
        <div class="header-meta">
          <span class="status-dot"></span>
          <span id="activeModelLabel">Somali Model Pilot 1</span>
        </div>
      </header>

      <section class="chat-panel glass-panel">
        <div class="messages" id="messages" aria-live="polite" aria-label="Conversation"></div>

        <form class="composer" id="chatForm">
          <div class="input-shell">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Ask about Somali culture, language, traditions, or history..."
              aria-label="Type your message"
            ></textarea>
            <button class="send-btn" id="sendBtn" type="submit" aria-label="Send message">
              Send
            </button>
          </div>
          <p class="composer-hint">Press Enter to send. Use Shift + Enter for a new line.</p>
        </form>
      </section>
    </main>
  </div>

  <template id="messageTemplate">
    <article class="message">
      <div class="avatar"></div>
      <div class="bubble-wrap">
        <div class="message-meta"></div>
        <div class="bubble"></div>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
